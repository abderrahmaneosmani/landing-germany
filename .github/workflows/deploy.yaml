name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REGISTRY_USER,REGISTRY_TOKEN
          script: |
            set -e
            REPO=/root/landing-germany

            if [ ! -d "$REPO/.git" ]; then
              git clone git@github.com:abderrahmaneosmani/landing-germany.git "$REPO"
            fi

            cd "$REPO"
            git pull origin main --no-edit

            # Authenticate to the registry so the push below can't silently fail
            printf '%s' "$REGISTRY_TOKEN" | docker login registry.gitlab.com -u "$REGISTRY_USER" --password-stdin

            docker compose build
            docker compose push

            cd /root/backend-germany
            docker compose pull landing
            docker compose up -d --force-recreate landing
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
