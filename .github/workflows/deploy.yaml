name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            REPO=/root/landing-germany

            if [ ! -d "$REPO/.git" ]; then
              git clone git@github.com:abderrahmaneosmani/landing-germany.git "$REPO"
            fi

            cd "$REPO"
            git pull origin main --no-edit

            docker compose build
            docker compose push
            docker compose up -d --force-recreate
