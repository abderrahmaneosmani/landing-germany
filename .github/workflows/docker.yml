name: Build and Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/landing
            git pull origin main --no-edit

            docker build -t registry.gitlab.com/abderrahmaneosmani8/learn-germany/landing:latest .
            docker push registry.gitlab.com/abderrahmaneosmani8/learn-germany/landing:latest

            docker compose pull
            docker compose up -d
